name: Deploy Backend AWS

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/deploy-backend-aws.yml"
      - "backend/main.py"
      - "backend/app/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  package-backend:
    name: Package Backend Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deployable backend bundle
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r "app/requirements.txt" -t package
          cp main.py package/
          cp -r app package/app
          cd package
          zip -r ../backend-release.zip .

      - name: Upload backend bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: backend/backend-release.zip

  publish-bundle-to-aws:
    name: Publish Bundle To AWS
    runs-on: ubuntu-latest
    needs: package-backend
    if: ${{ secrets.AWS_ROLE_ARN != '' && secrets.AWS_BACKEND_ARTIFACT_BUCKET != '' }}

    steps:
      - name: Download backend bundle
        uses: actions/download-artifact@v4
        with:
          name: backend-release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Upload backend bundle to S3
        env:
          AWS_BACKEND_ARTIFACT_BUCKET: ${{ secrets.AWS_BACKEND_ARTIFACT_BUCKET }}
        run: aws s3 cp backend-release.zip "s3://${AWS_BACKEND_ARTIFACT_BUCKET}/riverside-chatbot/${{ github.sha }}/backend-release.zip"
