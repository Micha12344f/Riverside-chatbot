name: CI

on:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "backend/main.py"
      - "backend/app/**"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "backend/main.py"
      - "backend/app/**"

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r "app/requirements.txt"
          pip install ruff

      - name: Lint backend code
        working-directory: backend
        run: ruff check main.py app

      - name: Build Python sources
        working-directory: backend
        run: python -m compileall main.py app

      - name: Smoke test chatbot CLI
        working-directory: backend
        run: printf 'exit\n' | python main.py
